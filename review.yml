  - date: '2026-06-03'
    rating: 2
    summary: >-
      Tongji University operates a real, official institutional Open Platform at
      api.tongji.edu.cn/docs whose documentation home resolves live (HTTP 200).
      The platform documents a broad set of campus APIs (personnel, teaching,
      library, one-card, research, notifications) but is gated behind a faculty/
      student application and approval flow using authorization-code/token auth
      with scope-based permissions and rate limiting, so no openly callable
      public endpoints were confirmed. Deep-linked SPA doc routes returned 404
      to plain HTTP probes (client-side routed). Official .edu.cn websites and
      the institutional LinkedIn school page were verified. No official Tongji
      University GitHub organization was confirmed, so none is claimed. No
      endpoints or properties were fabricated.
