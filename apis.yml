    description: >-
      Official institutional data and capability API platform for Tongji
      University. Provides documented APIs spanning personnel and student
      information, teaching and course/classroom data, library systems, the
      campus one-card system, research (patents, publications, projects),
      contracts and procurement, plus capability services such as SMS/email/
      WeChat notifications, document signing and cloud meeting integration.
      Access requires a faculty or student application and approval, using an
      authorization-code mode with token-based, scope-limited access and rate
      limiting.
