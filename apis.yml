aid: tongji
name: Tongji University
description: >-
  Tongji University is a leading public research university in Shanghai, China
  (Mainland), ranked #192 in the QS World University Rankings 2025. It operates
  an official institutional Open Platform at api.tongji.edu.cn that exposes
  campus data and capability APIs (personnel, teaching, library, one-card,
  research, notifications and more) to faculty and students. The platform is
  governed by an application-and-approval process with OAuth-style authorization
  codes, token-based access, scope-based permissions and rate limiting, so the
  documentation is publicly reachable but the APIs themselves are gated to
  authorized institutional users rather than open to the general public.
